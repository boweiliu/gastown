# Team role definition
# Persistent user-managed workspaces. Multiple per project.

role = "team"
scope = "rig"
nudge = "Check your assignment and mail, then act accordingly."
prompt_template = "team.md.tmpl"

[session]
pattern = "{prefix}-team-{name}"
work_dir = "{town}/{rig}/team/{name}"
needs_pre_sync = true
start_command = "exec claude --dangerously-skip-permissions"

[env]
GT_ROLE = "{rig}/team/{name}"
GT_SCOPE = "rig"

[health]
ping_timeout = "30s"
consecutive_failures = 3
kill_cooldown = "5m"
stuck_threshold = "4h"
