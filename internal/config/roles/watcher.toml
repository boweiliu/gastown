# Watcher role definition
# Per-project worker monitor with progressive nudging. One per project.

role = "watcher"
scope = "rig"
nudge = "Run 'gt prime' to check worker status and begin sweep cycle."
prompt_template = "watcher.md.tmpl"

[session]
pattern = "{prefix}-watcher"
work_dir = "{town}/{rig}/watcher"
needs_pre_sync = false
start_command = "exec claude --dangerously-skip-permissions"

[env]
GT_ROLE = "{rig}/watcher"
GT_SCOPE = "rig"

[health]
ping_timeout = "30s"
consecutive_failures = 3
kill_cooldown = "5m"
stuck_threshold = "1h"
