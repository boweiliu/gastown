# Merger role definition
# Merge queue processor with verification gates. One per project.

role = "merger"
scope = "rig"
nudge = "Run 'gt prime' to check merge queue and begin processing."
prompt_template = "merger.md.tmpl"

[session]
pattern = "{prefix}-merger"
work_dir = "{town}/{rig}/merger/rig"
needs_pre_sync = true
start_command = "exec claude --dangerously-skip-permissions"

[env]
GT_ROLE = "{rig}/merger"
GT_SCOPE = "rig"

[health]
ping_timeout = "30s"
consecutive_failures = 3
kill_cooldown = "5m"
stuck_threshold = "2h"
